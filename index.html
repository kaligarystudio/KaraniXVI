<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación Karani</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- INTRO -->
<div id="start-screen">
    <div id="rabbit">🐇</div>
    <p>¡Voy tarde! ¿Vienes conmigo?</p>
</div>

<!-- ESCENA -->
<div class="scene hidden">

    <div class="background"></div>
    <div id="particles"></div>

    <div class="content">
        <p class="intro">Bienvenido a un mundo mágico…</p>

        <h1>Karani</h1>
        <h2>te invita a sus</h2>

        <h3 class="dulces"><span>Dulces 16</span></h3>

        <div id="countdown"></div>

        <p class="details">
            8 de agosto 2026 · 19:00 hrs<br>
            Toluca, Estado de México
        </p>

        <button id="open-form">Confirmar asistencia</button>
    </div>
</div>

<!-- MODAL -->
<div id="form-modal" class="hidden">
    <div class="form-box">
        <h3>Confirmar asistencia</h3>

        <input type="text" id="nombre" placeholder="Tu nombre">
        <input type="number" id="personas" placeholder="¿Cuántas personas?" min="1">

        <button id="send">Enviar</button>
        <button id="close">Cancelar</button>

        <p id="status"></p>
    </div>
</div>

<audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js" defer></script>

</body>
</html>
