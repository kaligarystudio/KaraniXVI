<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karani · Dulces 16</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- INTRO -->
<section id="intro">

    <div class="mist"></div>

    <div class="intro-content">

        <div id="rabbit-container">

            <div id="rabbit">🐇</div>

            <div class="clock-intro">🕰️</div>

        </div>

        <h2 class="intro-title">
            El tiempo se ha detenido...
        </h2>

        <p class="intro-text">
            Un bosque encantado está por abrir sus puertas
        </p>

        <button id="enter-btn">
            Entrar al reino mágico ✨
        </button>

    </div>

</section>

<!-- PORTAL -->
<div id="portal"></div>

<!-- ESCENA -->
<main class="scene hidden">

    <!-- FONDO -->
<div class="forest">

    <div class="dragon-scene">

    <img
        src="img/dragon-patronus.png"
        class="dragon-img"
        alt="Dragon Patronus">

    <div class="dragon-fog"></div>

    <div class="dragon-sparkles"></div>

</div>
       <div class="forest-overlay"></div>

</div>
    <!-- CAPAS -->
    <div id="lights"></div>
    <div id="fairies"></div>
    <div id="clocks"></div>
    <div id="dragons"></div>

    <!-- CONTENIDO -->
    <section class="content">

        <p class="welcome">
            Bienvenido al bosque donde la magia despierta...
        </p>

        <h1>Karani</h1>

        <h2>te invita a sus</h2>

        <h3 class="dulces">
            <span>Dulces 16</span>
        </h3>

        <div class="details">

            <p>8 de Agosto 2026</p>
            <p>19:00 hrs</p>
            <p>Toluca, Estado de México</p>

        </div>

        <button id="open-form">
            Confirmar asistencia ✨
        </button>

    </section>

</main>

<!-- MODAL -->
<div id="form-modal">

    <div class="form-box">

        <h3>Confirmar asistencia</h3>

        <input
            type="text"
            id="nombre"
            placeholder="Tu nombre"
        >

        <input
            type="number"
            id="personas"
            placeholder="¿Cuántas personas?"
            min="1"
        >

        <button id="send">
            Enviar ✨
        </button>

        <button id="close">
            Cancelar
        </button>

        <p id="status"></p>

    </div>

</div>

<!-- AUDIO -->
<audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
