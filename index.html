<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karani · Dulces 16</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- INTRO -->
<section id="intro">

    <div class="mist"></div>

    <div class="intro-content">

        <div id="rabbit-container">

            <div id="rabbit">🐇</div>

            <div class="clock-intro">🕰️</div>

        </div>

        <h2 class="intro-title">
            El tiempo se ha detenido...
        </h2>

        <p class="intro-text">
            Un bosque encantado está por abrir sus puertas
        </p>

        <button id="enter-btn">
            Entrar al reino mágico ✨
        </button>

    </div>

</section>

<!-- PORTAL -->
<div id="portal"></div>

<!-- ESCENA -->
<main class="scene hidden">

    <!-- FONDO -->
<div class="forest">

    <!-- DRAGÓN GIGANTE -->
    <div class="giant-dragon">

    <!-- NUBE MÁGICA -->
    <div class="dragon-aura"></div>

    <!-- PARTÍCULAS -->
    <div class="dragon-particles"></div>

    <!-- SILUETA -->
    <svg class="dragon-svg"
         viewBox="0 0 1200 700"
         xmlns="http://www.w3.org/2000/svg">

        <defs>

            <filter id="glow">

                <feGaussianBlur stdDeviation="8"
                result="coloredBlur"/>

                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>

            </filter>

        </defs>

        <!-- ALA -->
        <path class="dragon-wing-left"
        d="
        M500 330
        C350 150, 180 180, 80 60
        C120 250, 250 360, 460 400
        Z"/>

        <!-- ALA -->
        <path class="dragon-wing-right"
        d="
        M700 330
        C850 150, 1020 180, 1120 60
        C1080 250, 950 360, 740 400
        Z"/>

        <!-- CUERPO -->
        <path class="dragon-body"
        d="
        M470 350
        C530 220, 720 220, 820 330
        C910 430, 900 560, 760 620
        C610 670, 420 590, 370 470
        C340 400, 390 370, 470 350
        Z"/>

        <!-- COLA -->
        <path class="dragon-tail"
        d="
        M780 560
        C930 640, 1050 720, 1180 650"/>

        <!-- CUELLO -->
        <path class="dragon-neck"
        d="
        M430 350
        C300 300, 240 210, 290 120"/>

        <!-- CABEZA -->
        <path class="dragon-head"
        d="
        M250 70
        C190 120, 190 180, 260 210
        C340 230, 390 180, 370 120
        C350 70, 300 50, 250 70
        Z"/>

        <!-- OJOS -->
        <circle class="dragon-eye"
        cx="285"
        cy="130"
        r="8"/>

    </svg>

</div>
    <div class="forest-overlay"></div>

</div>
    <!-- CAPAS -->
    <div id="lights"></div>
    <div id="fairies"></div>
    <div id="clocks"></div>
    <div id="dragons"></div>

    <!-- CONTENIDO -->
    <section class="content">

        <p class="welcome">
            Bienvenido al bosque donde la magia despierta...
        </p>

        <h1>Karani</h1>

        <h2>te invita a sus</h2>

        <h3 class="dulces">
            <span>Dulces 16</span>
        </h3>

        <div class="details">

            <p>8 de Agosto 2026</p>
            <p>19:00 hrs</p>
            <p>Toluca, Estado de México</p>

        </div>

        <button id="open-form">
            Confirmar asistencia ✨
        </button>

    </section>

</main>

<!-- MODAL -->
<div id="form-modal">

    <div class="form-box">

        <h3>Confirmar asistencia</h3>

        <input
            type="text"
            id="nombre"
            placeholder="Tu nombre"
        >

        <input
            type="number"
            id="personas"
            placeholder="¿Cuántas personas?"
            min="1"
        >

        <button id="send">
            Enviar ✨
        </button>

        <button id="close">
            Cancelar
        </button>

        <p id="status"></p>

    </div>

</div>

<!-- AUDIO -->
<audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
